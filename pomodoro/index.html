<html lang="fr">

    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <title>Pomodoro</title>
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/main.css">

        <link rel="icon" type="image/png" sizes="32x32" href="images/tomato.svg">

    </head>

    <body>
        <div id="create-container">
            <input id="time-input" type="text" placeholder="Temps en minutes">
            <button id="time-clear">X</button>
            <button id="time-add">Ajouter</button>
        </div>

        <p id="text-japanease">が<br>ん<br>ば<br>れ</p>


        <div id="queue-tomato"></div>

        <div class="tomato" id="tomato-1"></div>
        <div class="tomato" id="tomato-2"></div>
        <div class="tomato" id="tomato-3"></div>

        <div id="container-time">
            <div id="timer"></div>
            <button id="play-button">►</button>
        </div>

        <audio id="end-sound" src="sons/ding.mp3"></audio>



        <script src="js/main.js"></script>
    </body>

</html>
